# pytest.ini
# Pytest configuration for OrangeHRM DDTF Login Automation

[pytest]
# Default options: verbose output + auto-generate HTML report
addopts = -v --html=reports/report.html --self-contained-html

# Register custom markers to suppress PytestUnknownMarkWarning
markers =
    login: marks tests as login tests (deselect with -m "not login")

# Minimum pytest version required
minversion = 7.0

# Directories pytest should search for tests
testpaths = tests
