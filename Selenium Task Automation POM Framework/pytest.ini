[pytest]
# ──────────────────────────────────────────────────────────────
# Pytest Configuration for Zen Portal Test Suite
# ──────────────────────────────────────────────────────────────

# Default options: generate HTML report + verbose output
addopts =
    --html=reports/zen_portal_report.html
    --self-contained-html
    -v

# Test discovery paths
testpaths = tests

# Display options
log_cli = true
log_cli_level = INFO
