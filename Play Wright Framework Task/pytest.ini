[pytest]
# ── Test discovery ────────────────────────────────────────────────────────────
testpaths  = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── HTML report (pytest-html) ─────────────────────────────────────────────────
addopts =
    -v
    --html=reports/test_report.html
    --self-contained-html

# ── Markers ───────────────────────────────────────────────────────────────────
markers =
    login: Login-related tests
    logout: Logout-related tests
    ui: UI validation tests
