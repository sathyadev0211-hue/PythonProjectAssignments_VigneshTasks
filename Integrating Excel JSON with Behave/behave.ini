[behave]
# Behave configuration file

# Use allure formatter for report generation
format = allure_behave.formatter:AllureFormatter

# Output directory for allure results (JSON format)
outfiles = allure-results

# Also show progress in console
stdout_capture = false
stderr_capture = false

# Show step durations
show_timings = true

# Stop on first failure (set to false to run all scenarios)
stop = false

# Tags to include/exclude (uncomment as needed)
# tags = ~@wip
